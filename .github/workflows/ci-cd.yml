# File: .github/workflows/ci-cd.yml
name: OpenWeatherAPI CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      #  Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      #  Set up Python (optional if tests run in Python)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      #  Install dependencies (optional)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      #  Run tests (optional)
      - name: Run tests
        run: |
          echo "No tests yet"  # Replace with your pytest or unittest command if you have tests

      #  Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      #  Build Docker image
      - name: Build Docker image
        run: |
          docker build -t openweatherapi:latest .

      #  Push Docker image to Docker Hub
      - name: Push Docker image
        run: |
          docker tag openweatherapi:latest ${DOCKER_HUB_USERNAME}/openweatherapi:latest
          docker push ${DOCKER_HUB_USERNAME}/openweatherapi:latest
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}